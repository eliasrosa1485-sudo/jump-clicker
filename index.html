<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jump Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#1e90ff, #000);
    color: white;
    text-align: center;
}

#menu {
    position: absolute;
    width: 100%;
    top: 30%;
}

button {
    padding: 15px 30px;
    margin: 10px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: white;
}

#gameArea {
    display: none;
}

canvas {
    display: block;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🚀 Jump Clicker</h1>
    <p>Clique e vá até o SOL ☀️</p>

    <button onclick="startGame()">JOGAR</button>
</div>

<div id="gameArea">
    <canvas id="game"></canvas>
</div>

<script>
function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameArea").style.display = "block";
    initGame();
}

function initGame() {
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let y = canvas.height - 150;
let velocity = 0;
let gravity = 0.6;

let power = 0;
let charging = false;

window.addEventListener("mousedown", ()=> charging = true);
window.addEventListener("mouseup", ()=>{
    velocity = -power * 0.6;
    charging = false;
    power = 0;
});

function update() {
    if (charging && power < 100) power += 2;

    velocity += gravity;
    y += velocity;

    if (y > canvas.height - 150) {
        y = canvas.height - 150;
        velocity = -15;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "blue";
    ctx.fillRect(canvas.width/2 - 100, canvas.height - 100, 200, 20);

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(canvas.width/2, y, 20, 0, Math.PI*2);
    ctx.fill();

    requestAnimationFrame(update);
}

update();
}
</script>

</body>
</html>
